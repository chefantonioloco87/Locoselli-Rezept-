<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locoselli Archivio</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo-apple.png">
<meta name="theme-color" content="#090909">
<style>
:root{
  --bg:#090909; --panel:#101010; --panel2:#141414;
  --gold:#b7923c; --gold2:#d6b45c; --line:rgba(183,146,60,.35);
  --text:#f2eee7; --muted:#bcae91; --shadow:0 12px 34px rgba(0,0,0,.38);
  --radius:22px;
  --sidebar-w:260px;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
a{text-decoration:none;color:inherit}
button{font-family:inherit}
.hidden{display:none!important}

/* ---------- GATE (login) ---------- */
.codegate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.codecard{
  width:min(520px,100%);padding:30px;border-radius:28px;
  background:linear-gradient(180deg,#121212,#101010);
  border:1px solid var(--line);box-shadow:var(--shadow);text-align:center
}
.codecard .logo-fallback,
.codecard img{width:90px;height:90px;object-fit:contain;display:block;margin:0 auto 14px}
.codecard h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:36px;color:var(--gold2)}
.codecard p{margin:12px 0 0;color:var(--muted);line-height:1.55}
.input{
  width:100%;margin-top:18px;padding:16px 18px;border-radius:18px;border:1px solid var(--line);
  background:#0f1013;color:#fff;font-size:16px;outline:none
}
.input:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(183,146,60,.12)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;margin-top:14px;padding:11px 16px;border-radius:14px;
  background:rgba(183,146,60,.16);color:var(--gold2);font-weight:800;border:1px solid rgba(183,146,60,.24);cursor:pointer
}
.btn.secondary{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.12)}
.btn.full{width:100%}

/* ---------- LAYOUT con SIDEBAR ---------- */
.app-shell{display:flex;min-height:100vh}

.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:linear-gradient(180deg,#0d0d0d,#0a0a0a);
  border-right:1px solid rgba(183,146,60,.18);
  padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto
}
.sidebar .brand{display:flex;align-items:center;gap:12px;padding:0 6px 16px;border-bottom:1px solid rgba(183,146,60,.15);margin-bottom:14px}
.sidebar .brand img,
.sidebar .brand .logo-fallback{width:42px;height:42px;object-fit:contain;flex-shrink:0}
.sidebar .brand .brand-title{font-family:Georgia,"Times New Roman",serif;font-size:20px;color:var(--gold2);line-height:1}
.sidebar .brand .brand-sub{font-size:11px;color:var(--muted);margin-top:4px}

.nav-group{margin-top:14px}
.nav-label{
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2);
  padding:6px 10px;margin-bottom:4px;opacity:.85
}
.nav-item{
  display:block;width:100%;text-align:left;padding:11px 12px;border-radius:12px;
  background:transparent;border:1px solid transparent;color:var(--text);
  font-size:14px;cursor:pointer;margin-bottom:3px
}
.nav-item:hover{background:rgba(183,146,60,.08)}
.nav-item.active{
  background:rgba(183,146,60,.16);border-color:rgba(183,146,60,.28);color:var(--gold2);font-weight:700
}

.sidebar .logout-wrap{margin-top:18px;padding-top:14px;border-top:1px solid rgba(183,146,60,.15)}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;padding:22px 26px 40px;max-width:1100px}

.main-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.menu-toggle{
  display:none;background:rgba(183,146,60,.14);border:1px solid var(--line);color:var(--gold2);
  width:42px;height:42px;border-radius:12px;font-size:20px;cursor:pointer;flex-shrink:0
}
.section-heading{
  font-family:Georgia,"Times New Roman",serif;font-size:26px;color:var(--gold2);margin:0;flex:1;min-width:0
}

.search-box{position:relative;margin-bottom:8px}
.search{
  width:100%;border-radius:20px;border:1px solid var(--line);background:#0f1013;color:var(--text);
  padding:15px 50px 15px 18px;font-size:16px;outline:none;box-shadow:var(--shadow)
}
.search:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(183,146,60,.12),var(--shadow)}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--gold2);font-size:20px;pointer-events:none}
.meta{margin:14px 2px 18px;color:var(--muted);font-size:13px}

/* ---------- CARDS ---------- */
.courses{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.course-card,.card{
  background:linear-gradient(180deg,#121212,#101010);
  border:1px solid rgba(183,146,60,.28);border-radius:20px;box-shadow:var(--shadow);padding:18px
}
.course-card h3,.card h3{
  margin:0;font-family:Georgia,"Times New Roman",serif;font-size:19px;line-height:1.2;color:var(--text)
}
.course-card p,.card p{margin:10px 0 0;color:var(--muted);font-size:14px;line-height:1.45}
.list{display:grid;gap:14px}
.card{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
.snippet{margin-top:10px;color:var(--muted);font-size:15px;line-height:1.55}
.tag{
  align-self:start;white-space:nowrap;border-radius:12px;padding:10px 12px;
  background:rgba(183,146,60,.16);color:var(--gold2);border:1px solid rgba(183,146,60,.2);font-weight:800;font-size:12px
}
.file{margin-top:10px;color:#8e846f;font-size:11px;word-break:break-word}
.empty{border:1px dashed rgba(183,146,60,.28);border-radius:20px;padding:26px;text-align:center;color:var(--muted)}
.loading{text-align:center;padding:30px;color:var(--muted)}
mark{background:rgba(214,180,92,.95);color:#000;padding:0 .14em;border-radius:4px}

/* logo fallback (lettera L) se l'immagine non carica */
.logo-fallback{
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#b7923c,#d6b45c);
  color:#0a0a0a;font-family:Georgia,"Times New Roman",serif;font-weight:800;
  border-radius:50%
}
.codecard .logo-fallback{font-size:44px}
.sidebar .logo-fallback{font-size:22px}

/* ---------- MOBILE ---------- */
.backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30
}
@media (max-width:860px){
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center}
  .sidebar{
    position:fixed;top:0;left:0;height:100vh;z-index:40;
    transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:8px 0 30px rgba(0,0,0,.5)
  }
  .sidebar.open{transform:translateX(0)}
  .backdrop.open{display:block}
  .main{padding:18px 16px 40px}
  .courses{grid-template-columns:1fr}
  .card{grid-template-columns:1fr}
  .section-heading{font-size:22px}
}
</style>
</head>
<body>

<!-- ======= GATE ======= -->
<div id="gate" class="codegate">
  <div class="codecard">
    <img src="logo.png?v=3" alt="Locoselli" onerror="if(!this.dataset.f){this.dataset.f=1;this.src='https://raw.githubusercontent.com/chefantonioloco87/Locoselli-Rezept-/main/logo.png';}else{this.outerHTML='<div class=&quot;logo-fallback&quot;>L</div>';}">
    <h1>Locoselli</h1>
    <p>Archivio ricette e corsi.<br>Inserisci il codice per entrare.</p>
    <input id="codeInput" class="input" type="password" placeholder="Codice accesso">
    <button id="enterBtn" class="btn full">Entra</button>
    <p id="errorMsg" style="color:#ff8c8c"></p>
  </div>
</div>

<!-- ======= APP ======= -->
<div id="app" class="hidden">
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <img src="logo.png?v=3" alt="Locoselli logo" onerror="if(!this.dataset.f){this.dataset.f=1;this.src='https://raw.githubusercontent.com/chefantonioloco87/Locoselli-Rezept-/main/logo.png';}else{this.outerHTML='<div class=&quot;logo-fallback&quot;>L</div>';}">
        <div>
          <div class="brand-title">Locoselli</div>
          <div class="brand-sub">Archivio ricette + corsi</div>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-label">Generale</div>
        <button class="nav-item active" data-section="all">Tutte le ricette</button>
        <button class="nav-item" data-section="courses">Corsi Damiano</button>
      </div>

      <div class="nav-group">
        <div class="nav-label">Molecolare</div>
        <button class="nav-item" data-section="filter" data-filter="agar">Agar</button>
        <button class="nav-item" data-section="filter" data-filter="maltodestrina">Maltodestrina</button>
        <button class="nav-item" data-section="filter" data-filter="inulina">Inulina</button>
        <button class="nav-item" data-section="filter" data-filter="glice">Glice</button>
        <button class="nav-item" data-section="filter" data-filter="pectina">Pectina</button>
        <button class="nav-item" data-section="filter" data-filter="sferificazione">Sferificazione</button>
      </div>

      <div class="nav-group">
        <div class="nav-label">Basi</div>
        <button class="nav-item" data-section="filter" data-filter="bigne">Bignè</button>
        <button class="nav-item" data-section="filter" data-filter="tiramisu">Tiramisù</button>
        <button class="nav-item" data-section="filter" data-filter="mousse">Mousse</button>
        <button class="nav-item" data-section="filter" data-filter="frolla">Frolla</button>
        <button class="nav-item" data-section="filter" data-filter="panettone">Panettone</button>
        <button class="nav-item" data-section="filter" data-filter="pandoro">Pandoro</button>
        <button class="nav-item" data-section="filter" data-filter="biscuit">Biscuit</button>
        <button class="nav-item" data-section="filter" data-filter="pan-di-spagna">Pan di Spagna</button>
      </div>

      <div class="logout-wrap">
        <button id="logoutBtn" class="btn secondary full">Esci</button>
      </div>
    </aside>

    <div id="backdrop" class="backdrop"></div>

    <!-- MAIN -->
    <main class="main">
      <div class="main-top">
        <button id="menuToggle" class="menu-toggle" aria-label="Apri menu">☰</button>
        <h2 id="sectionHeading" class="section-heading">Tutte le ricette</h2>
      </div>

      <div class="search-box">
        <input id="search" class="search" placeholder="Cerca per ingrediente, nome, tecnica...">
        <div class="search-icon">⌕</div>
      </div>

      <div class="meta"><span id="totalCount">0</span> ricette totali • 9 corsi Damiano</div>

      <!-- Sezione Corsi -->
      <div id="coursesSection" class="hidden">
        <div class="courses" id="courses"></div>
      </div>

      <!-- Sezione Ricette -->
      <div id="recipesSection">
        <div class="loading" id="loading">Caricamento ricette…</div>
        <div class="list" id="list"></div>
        <div class="empty hidden" id="empty">Nessun risultato trovato.</div>
      </div>
    </main>
  </div>
</div>

<script>
const ACCESS_CODE = "Loco0106R";
let indexed = [];
let currentSection = "all";   // "all" | "courses" | "filter"
let currentFilter = null;

const damianoCourses = [
  ["corso-avanzato-lezione1-pate-a-choux.html","Lezione 1","Pâte à choux e basi collegate"],
  ["corso-avanzato-lezione2-biscuit-moderni.html","Lezione 2","Biscuit moderni"],
  ["corso-avanzato-lezione3-mousse-bavaresi.html","Lezione 3","Mousse e bavaresi"],
  ["corso-avanzato-lezione4-glasse-specchio.html","Lezione 4","Glasse specchio"],
  ["corso-avanzato-lezione5-cioccolato-avanzato.html","Lezione 5","Cioccolato avanzato"],
  ["corso-avanzato-lezione6-zucchero-isomalto.html","Lezione 6","Zucchero e isomalto"],
  ["corso-avanzato-lezione7-dessert-al-piatto.html","Lezione 7","Dessert al piatto"],
  ["corso-avanzato-lezione8-signature-dessert.html","Lezione 8","Signature dessert"],
  ["corso-damiano-ricettario-25.html","Ricettario Damiano","Raccolta Damiano 25"]
];

const listEl = document.getElementById("list");
const emptyEl = document.getElementById("empty");
const loadingEl = document.getElementById("loading");
const totalCountEl = document.getElementById("totalCount");
const searchEl = document.getElementById("search");
const coursesEl = document.getElementById("courses");
const coursesSection = document.getElementById("coursesSection");
const recipesSection = document.getElementById("recipesSection");
const sectionHeading = document.getElementById("sectionHeading");
const gateEl = document.getElementById("gate");
const appEl = document.getElementById("app");
const codeInput = document.getElementById("codeInput");
const errorMsg = document.getElementById("errorMsg");
const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("backdrop");

function prettyName(name){ return name.replace(".html","").replace(/-/g," "); }
function stripHtml(html){
  const doc = new DOMParser().parseFromString(html, "text/html");
  return (doc.body ? doc.body.innerText : "").replace(/\s+/g," ").trim();
}
function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
function highlight(text,q){
  if(!q) return text;
  const safe = escapeRegExp(q);
  return text.replace(new RegExp("(" + safe + ")","ig"), "<mark>$1</mark>");
}
function snippet(text,q){
  if(!text) return "";
  if(!q){ return text.slice(0,160) + (text.length > 160 ? "…" : ""); }
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q.toLowerCase());
  if(idx < 0){ return text.slice(0,160) + (text.length > 160 ? "…" : ""); }
  const start = Math.max(0, idx - 70);
  const end = Math.min(text.length, idx + q.length + 150);
  const out = (start > 0 ? "…" : "") + text.slice(start,end) + (end < text.length ? "…" : "");
  return highlight(out,q);
}
function getTag(item){
  const n = item.name.toLowerCase();
  if(n.includes("agar")) return "AGAR";
  if(n.includes("maltodestrina")) return "MALTODESTRINA";
  if(n.includes("neutral")) return "NEUTRAL";
  if(n.includes("panettone")) return "PANETTONE";
  if(n.includes("pandoro")) return "PANDORO";
  if(n.includes("corso") || n.includes("lezione")) return "CORSI";
  if(n.includes("ricettario")) return "RICETTARIO";
  return "RICETTA";
}
function filterItems(){
  const q = searchEl.value.toLowerCase().trim();
  return indexed.filter(item => {
    const inSearch = !q || item.title.toLowerCase().includes(q) || item.text.toLowerCase().includes(q);
    let filterOk = true;
    if(currentSection === "filter" && currentFilter){
      filterOk = item.name.toLowerCase().includes(currentFilter) || item.text.toLowerCase().includes(currentFilter);
    }
    return inSearch && filterOk;
  });
}
function renderCourses(){
  coursesEl.innerHTML = damianoCourses.map(([file,title,desc]) => `
    <div class="course-card">
      <h3>${title}</h3>
      <p>${desc}</p>
      <a class="btn" href="${file}">Apri</a>
    </div>
  `).join("");
}
function renderRecipes(){
  const q = searchEl.value.trim();
  const filtered = filterItems();

  listEl.innerHTML = filtered.map(item => {
    const isCourse = /(corso|lezione)/i.test(item.name);
    let link = item.name;
    if(isCourse && q){
      link = "open-course-match.html?file=" + encodeURIComponent(item.name) + "&q=" + encodeURIComponent(q) + "&title=" + encodeURIComponent(item.title);
    }
    return `
      <div class="card">
        <div>
          <h3>${highlight(item.title, q)}</h3>
          <div class="snippet">${snippet(item.text || item.title, q)}</div>
          <div class="file">${item.name}</div>
        </div>
        <div>
          <div class="tag">${getTag(item)}</div>
          <a class="btn" href="${link}" style="margin-top:12px">Apri</a>
        </div>
      </div>
    `;
  }).join("");

  emptyEl.classList.toggle("hidden", filtered.length > 0 || indexed.length === 0);
}
function render(){
  if(currentSection === "courses"){
    coursesSection.classList.remove("hidden");
    recipesSection.classList.add("hidden");
  }else{
    coursesSection.classList.add("hidden");
    recipesSection.classList.remove("hidden");
    renderRecipes();
  }
}
async function load(){
  try{
    const res = await fetch("https://api.github.com/repos/chefantonioloco87/Locoselli-Rezept-/contents");
    const data = await res.json();
    const files = data.filter(f => f.name.endsWith(".html") && f.name !== "index.html" && f.name !== "open-course-match.html");
    totalCountEl.textContent = files.length;
    indexed = await Promise.all(files.map(async f => {
      try{
        const page = await fetch(f.name);
        const html = await page.text();
        return { name:f.name, title:prettyName(f.name), text:stripHtml(html) };
      }catch(e){
        return { name:f.name, title:prettyName(f.name), text:"" };
      }
    }));
    loadingEl.classList.add("hidden");
    renderCourses();
    render();
  }catch(e){
    loadingEl.classList.add("hidden");
    listEl.innerHTML = "<div class='empty'>Errore nel caricamento del repo.</div>";
  }
}

/* ---- Navigazione sidebar ---- */
document.querySelectorAll(".nav-item").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const section = btn.dataset.section;
    if(section === "all"){
      currentSection = "all";
      currentFilter = null;
      sectionHeading.textContent = "Tutte le ricette";
    }else if(section === "courses"){
      currentSection = "courses";
      currentFilter = null;
      sectionHeading.textContent = "Corsi Damiano";
    }else if(section === "filter"){
      currentSection = "filter";
      currentFilter = btn.dataset.filter;
      sectionHeading.textContent = btn.textContent;
    }
    render();
    // chiudi sidebar su mobile
    sidebar.classList.remove("open");
    backdrop.classList.remove("open");
  });
});

searchEl.addEventListener("input", render);

/* ---- Mobile menu ---- */
document.getElementById("menuToggle").addEventListener("click", () => {
  sidebar.classList.add("open");
  backdrop.classList.add("open");
});
backdrop.addEventListener("click", () => {
  sidebar.classList.remove("open");
  backdrop.classList.remove("open");
});

/* ---- Login ---- */
document.getElementById("enterBtn").addEventListener("click", () => {
  if((codeInput.value || "") === ACCESS_CODE){
    localStorage.setItem("locoselli_access","ok");
    gateEl.classList.add("hidden");
    appEl.classList.remove("hidden");
    load();
  }else{
    errorMsg.textContent = "Codice errato. Riprova.";
  }
});
codeInput.addEventListener("keydown", e => { if(e.key === "Enter") document.getElementById("enterBtn").click(); });
document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("locoselli_access");
  location.reload();
});
if(localStorage.getItem("locoselli_access") === "ok"){
  gateEl.classList.add("hidden");
  appEl.classList.remove("hidden");
  load();
}
</script>
</body>
</html>
