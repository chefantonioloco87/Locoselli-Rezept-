<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locoselli Archivio</title>
<style>
body{margin:0;background:#0b0b0d;color:#fff;font-family:Arial}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#17171d;padding:15px;border-radius:12px;margin-bottom:10px}
.btn{background:#d7aa2b;color:#000;padding:8px 12px;border-radius:8px;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
<h1>Locoselli Archivio</h1>
<input id="search" placeholder="cerca..." style="width:100%;padding:10px;margin-bottom:20px">
<div id="list"></div>
</div>

<script>
let files=[];

async function load(){
  const res = await fetch("https://api.github.com/repos/chefantonioloco87/Locoselli-Rezept-/contents");
  const data = await res.json();
  files = data.filter(f=>f.name.endsWith(".html") && f.name!=="index.html" && f.name!=="open-course-match.html");
  render();
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = files.filter(f=>!q || f.name.toLowerCase().includes(q))
  .map(f=>{
    const isCorso = f.name.includes("corso") || f.name.includes("lezione");
    let link = f.name;
    if(isCorso && q){
      link = "open-course-match.html?file="+encodeURIComponent(f.name)+"&q="+encodeURIComponent(q);
    }
    return `<div class="card">
      <b>${f.name}</b><br>
      <a class="btn" href="${link}">Apri</a>
    </div>`;
  }).join("");
}

document.getElementById("search").addEventListener("input",render);
load();
</script>

</body>
</html>
