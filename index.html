<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locoselli</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo-apple.png">
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#0b0b0d;color:#fff}
.wrap{padding:20px;max-width:1100px;margin:auto}
.logo{width:90px;display:block;margin:20px auto}
.search{width:100%;padding:14px;border-radius:12px;border:none;margin-bottom:25px;background:#17171d;color:#fff;font-size:16px}
.section{margin-top:30px}
h1,h2{margin:0 0 15px 0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.card{background:#17171d;padding:14px;border-radius:12px}
.btn{display:block;margin-top:10px;background:#d7aa2b;color:#000;padding:8px;border-radius:8px;text-align:center;font-weight:bold;text-decoration:none}
.muted{color:#b8b8c0}
@media(min-width:700px){.grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="wrap">
<img src="logo.png" class="logo" alt="Locoselli logo">
<h1>Locoselli Archivio</h1>
<input id="search" class="search" placeholder="Cerca ingrediente: agar, maltodestrina, panettone...">

<div class="section">
<h2>🎓 Corsi</h2>
<div class="grid">
<div class="card">
<b>Corsi Damiano</b>
<div class="muted">Lezioni avanzate di pasticceria</div>
<a class="btn" href="corso-avanzato-lezione1-pate-a-choux.html">Apri</a>
</div>
<div class="card">
<b>Corso Molecolare</b>
<div class="muted">Tecniche e applicazioni molecolari</div>
<a class="btn" href="corso-molecolare-avanzato-2023.html">Apri</a>
</div>
<div class="card">
<b>Corso Pasticceria</b>
<div class="muted">Pasticceria da ristorazione e creativa</div>
<a class="btn" href="corso-pasticceria-ristorazione-molecolare.html">Apri</a>
</div>
</div>
</div>

<div class="section">
<h2>🧪 Ricerca per ingrediente</h2>
<div id="list" class="grid"></div>
</div>
</div>

<script>
let files = [];

async function load(){
  try{
    const res = await fetch("https://api.github.com/repos/chefantonioloco87/Locoselli-Rezept-/contents");
    const data = await res.json();

    files = data.filter(f =>
      f.name.endsWith(".html") &&
      !f.name.includes("corso") &&
      f.name !== "index.html" &&
      f.name !== "open-course-match.html"
    );

    render();
  }catch(e){
    document.getElementById("list").innerHTML = "<div class='card'>Errore nel caricamento del repo.</div>";
    console.error(e);
  }
}

function prettyName(name){
  return name.replace(".html","").replace(/-/g," ");
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("list");

  const filtered = files.filter(f => !q || f.name.toLowerCase().includes(q));

  box.innerHTML = filtered.map(f => `
    <div class="card">
      <b>${prettyName(f.name)}</b>
      <div class="muted">${f.name}</div>
      <a class="btn" href="${f.name}">Apri</a>
    </div>
  `).join("");

  if(!filtered.length){
    box.innerHTML = "<div class='card'>Nessun risultato trovato.</div>";
  }
}

document.getElementById("search").addEventListener("input", render);
load();
</script>
</body>
</html>
