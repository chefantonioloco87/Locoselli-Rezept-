<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locoselli</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo-apple.png">
<style>
body{margin:0;background:#0b0b0d;color:#f5f5f7;font-family:-apple-system}
.wrap{max-width:1000px;margin:auto;padding:20px}
.logo{width:90px;display:block;margin:20px auto}
.search{width:100%;padding:16px;border-radius:20px;border:1px solid #d7aa2b;background:#121214;color:#fff;font-size:16px;margin-bottom:20px}
.section{margin-top:30px}
h2{color:#d7aa2b;margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.chip{padding:10px 16px;border-radius:999px;border:1px solid #d7aa2b;background:transparent;color:#fff;cursor:pointer}
.chip.active,.chip:hover{background:#d7aa2b;color:#000}
.list{display:grid;gap:16px}
.card{background:#151518;border-radius:18px;padding:18px;border:1px solid rgba(215,170,43,.2)}
.title{font-size:20px;margin-bottom:8px}
.tag{font-size:12px;color:#d7aa2b;margin-bottom:6px}
.btn{display:inline-block;margin-top:10px;padding:8px 12px;border-radius:10px;background:#d7aa2b;color:#000;font-weight:bold}
</style>
</head>
<body>

<div class="wrap">
<img src="logo.png" class="logo">

<input id="search" class="search" placeholder="Cerca ingrediente o tecnica...">

<div class="section">
<h2>🎓 Corsi</h2>
<div class="list">
<div class="card"><div class="title">Corso Damiano</div><a class="btn" href="corso-avanzato-lezione1-pate-a-choux.html">Apri</a></div>
<div class="card"><div class="title">Corso Molecolare</div><a class="btn" href="corso-molecolare-avanzato-2023.html">Apri</a></div>
</div>
</div>

<div class="section">
<h2>🧪 Molecolare</h2>
<div class="chips">
<button class="chip active" onclick="setFilter('all', this)">Tutto</button>
<button class="chip" onclick="setFilter('agar', this)">Agar</button>
<button class="chip" onclick="setFilter('maltodestrina', this)">Maltodestrina</button>
<button class="chip" onclick="setFilter('inulina', this)">Inulina</button>
<button class="chip" onclick="setFilter('glice', this)">Glice</button>
<button class="chip" onclick="setFilter('pectina', this)">Pectina</button>
<button class="chip" onclick="setFilter('sferificazione', this)">Sferificazione</button>
</div>
</div>

<div class="section">
<h2>🍽️ Basi</h2>
<div class="chips">
<button class="chip" onclick="setFilter('bigne', this)">Bignè</button>
<button class="chip" onclick="setFilter('tiramisu', this)">Tiramisù</button>
<button class="chip" onclick="setFilter('mousse', this)">Mousse</button>
<button class="chip" onclick="setFilter('frolla', this)">Frolla</button>
<button class="chip" onclick="setFilter('panettone', this)">Panettone</button>
</div>
</div>

<div id="list" class="list"></div>

</div>

<script>
let files=[];
let currentFilter="all";

async function load(){
const res=await fetch("https://api.github.com/repos/chefantonioloco87/Locoselli-Rezept-/contents");
const data=await res.json();

files=data.filter(f=>f.name.endsWith(".html") && f.name!=="index.html" && f.name!=="open-course-match.html");
render();
}

function pretty(name){
return name.replace(".html","").replace(/-/g," ");
}

function setFilter(f,el){
currentFilter=f;
document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
render();
}

function render(){
const q=document.getElementById("search").value.toLowerCase();
const box=document.getElementById("list");

box.innerHTML=files.filter(f=>{
const name=f.name.toLowerCase();
const searchOk=!q || name.includes(q);
const filterOk=currentFilter==="all" || name.includes(currentFilter);
return searchOk && filterOk;
}).map(f=>`
<div class="card">
<div class="title">${pretty(f.name)}</div>
<div class="tag">${f.name}</div>
<a class="btn" href="${f.name}">Apri</a>
</div>
`).join("");
}

document.getElementById("search").addEventListener("input",render);

load();
</script>

</body>
</html>
